---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app planka-prod
  namespace: planka
spec:
  postBuild:
    substitute:
      APP: *app

  prune: true
  interval: 1h
  path: cluster/apps/self-hosted/planka/prod
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
