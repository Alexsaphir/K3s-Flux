---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: your-spotify
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: your-spotify-secret
    template:
      data:
        SPOTIFY_PUBLIC: '{{ .SPOTIFY_PUBLIC }}'
        SPOTIFY_SECRET: '{{ .SPOTIFY_SECRET }}'

  dataFrom:
    - extract:
        key: your-spotify
