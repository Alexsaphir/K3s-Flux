---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app your-spotify
  namespace: your-spotify
spec:
  postBuild:
    substitute:
      APP: *app

  prune: true
  interval: 1h
  path: cluster/apps/self-hosted/your-spotify/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
