---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app foundryvtt
  namespace: foundryvtt
spec:
  components:
    - ../../../../components/volsync

  postBuild:
    substitute:
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 10Gi

  prune: true
  interval: 1h
  path: cluster/apps/self-hosted/foundryvtt/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
