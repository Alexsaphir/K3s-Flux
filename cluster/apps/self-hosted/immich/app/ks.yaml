---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app immich
  namespace: immich
spec:
  components:
    - ../../../../components/volsync

  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph

    # - name: postgres-immich

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 300Gi

  prune: true
  interval: 1h
  path: cluster/apps/self-hosted/immich/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
