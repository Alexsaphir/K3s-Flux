---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: immich
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.2
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app

  driftDetection:
    mode: enabled
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  values:
    immich:
      # renovate: datasource=github-releases depName=immich-app/immich
      version: &immichVersion v2.5.6

    controllers:
      immich:
        enabled: true
        type: deployment
        replicas: 1

        annotations:
          reloader.stakater.com/auto: 'true'

        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: *immichVersion
            env:
              TZ: ${TIMEZONE}
              NODE_ENV: &node-env production

              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: postgres-immich-app
                    key: uri

            envFrom:
              - configMapRef:
                  name: &configMap immich-config

            resources:
              requests:
                cpu: 100m
                memory: 512Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ 'ALL' ] }


      machine-learning:
        enabled: true
        type: deployment

        annotations:
          reloader.stakater.com/auto: 'true'

        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: *immichVersion

            env:
              TZ: ${TIMEZONE}
              NODE_ENV: *node-env
              MACHINE_LEARNING_CACHE_FOLDER: /cache
              TRANSFORMERS_CACHE: /cache
              HF_XET_CACHE: /cache/huggingface-xet
              MPLCONFIGDIR: /cache/matplotlib-config

            envFrom:
              - configMapRef:
                  name: *configMap

            resources:
              requests:
                cpu: 100m
                memory: 2500Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ 'ALL' ] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: 'OnRootMismatch'
        seccompProfile: { type: RuntimeDefault }


    service:
      app:
        controller: immich
        ports:
          http:
            port: 2283

      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: 3003

    persistence:
      settings:
        type: configMap
        name: immich-config
        advancedMounts:
          immich:
            app:
              - path: /usr/src/app/immich-config.yaml
                subPath: immich-config.yaml

      library:
        existingClaim: immich
        globalMounts:
          - path: /usr/src/app/upload

      modelcache:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 10Gi
        retain: true
        advancedMounts:
          machine-learning:
            app:
              - path: /cache

      tmp:
        type: emptyDir
        advancedMounts:
          machine-learning:
            app:
              - path: /tmp

    configMaps:
      config:
        enabled: true
        data:
          LOG_LEVEL: 'log'
          NODE_ENV: 'production'

          REDIS_HOSTNAME: immich-dragonfly
          REDIS_PORT: '6379'

          IMMICH_CONFIG_FILE: /usr/src/app/immich-config.yaml

          IMMICH_SERVER_URL: http://immich-app:3001
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003

          TRANSFORMERS_CACHE: /usr/src/app/.transformers_cache
