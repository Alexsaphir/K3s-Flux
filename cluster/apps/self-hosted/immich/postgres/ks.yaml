---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-immich
  namespace: &namespace immich
spec:
  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg

#  healthChecks:
#    - apiVersion: v1
#      kind: Pod
#      name: postgres-immich-1
#      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/apps/self-hosted/immich/postgres
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
