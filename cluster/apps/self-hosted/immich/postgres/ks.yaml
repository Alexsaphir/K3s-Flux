---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-immich
  namespace: &namespace immich
spec:
  components:
    - ../../../../components/postgres-store

  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg

  prune: true
  interval: 1h
  path: cluster/apps/self-hosted/immich/postgres
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
