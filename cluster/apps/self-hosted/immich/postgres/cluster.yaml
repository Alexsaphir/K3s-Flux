---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: &name postgres-immich
  annotations:
    kyverno.io/ignore: 'true'
    cnpg.io/skipEmptyWalArchiveCheck: 'enabled'

spec:
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: pgvecto.rs
    major: 16

  instances: 3
  enablePDB: true

  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser

  bootstrap:
    recovery:
      source: live

  postgresql:
    shared_preload_libraries:
      - 'vectors.so'

    parameters:
      max_connections: '200'
      max_slot_wal_keep_size: 5GB
      shared_buffers: '128MB'

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: minio-store

  externalClusters:
    - name: source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: minio-store
          serverName: *name

    - name: live
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: live-store
          serverName: postgres-16-v6

  resources:
    requests:
      memory: '512Mi'

  storage:
    size: 10Gi
    storageClass: openebs-hostpath

  monitoring:
    enablePodMonitor: true
