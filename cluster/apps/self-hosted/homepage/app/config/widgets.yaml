---
- search:
    provider: [ google ]
    focus: false
    target: _blank

- openmeteo:
    label: Home
    latitude: {{HOMEPAGE_VAR_LATITUDE}}
    longitude: {{HOMEPAGE_VAR_LONGITUDE}}
    units: metric
    cache: 5

- unifi_console:
    url: {{HOMEPAGE_VAR_UNIFI_URL}}
    key: {{HOMEPAGE_VAR_UNIFI_KEY}}
