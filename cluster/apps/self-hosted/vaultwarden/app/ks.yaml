---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app vaultwarden
  namespace: vaultwarden
spec:
  components:
    - ../../../../components/volsync

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 5Gi

  prune: true
  interval: 1h
  path: cluster/apps/self-hosted/vaultwarden/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
