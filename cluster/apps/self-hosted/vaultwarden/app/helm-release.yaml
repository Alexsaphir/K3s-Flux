---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: vaultwarden
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.2
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: vaultwarden

  values:
    vaultwarden:
      domain_name: &domain_name vaultwarden.${DOMAIN_NAME}

      # https://github.com/dani-garcia/vaultwarden/blob/main/.env.template#L343-L356
      feature_flags:
        - autofill-v2
        - ssh-key-vault-item
        - ssh-agent
        - fido2-vault-credentials
        - inline-menu-positioning-improvements

    controllers:
      vaultwarden:
        annotations:
          reloader.stakater.com/auto: 'true'

        containers:
          app:
            image:
              repository: ghcr.io/dani-garcia/vaultwarden
              tag: 1.35.4

            envFrom:
              - secretRef:
                  name: '{{ .Release.Name }}-secret'

            env:
              TZ: '${TIMEZONE}'

              PUSH_ENABLED: 'true'
              SIGNUPS_ALLOWED: 'false'
              INVITATIONS_ALLOWED: 'false'
              INVITATION_ORG_NAME: 'Vaultwarden_Alexsaphir'
              ORG_GROUPS_ENABLED: 'true'
              EXPERIMENTAL_CLIENT_FEATURE_FLAGS: '{{ .Values.vaultwarden.feature_flags | join "," }}'

              DOMAIN: 'https://{{ .Values.vaultwarden.domain_name }}'

              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: database-vaultwarden
                    key: POSTGRES_URL

              SMTP_HOST: mailpit.kube-system.svc.cluster.local
              SMTP_FROM: vaultwarden@domain.com
              SMTP_FROM_NAME: Vaultwarden
              SMTP_SECURITY: 'off'
              SMTP_PORT: 1025

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ 'ALL' ] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        ports:
          http:
            port: 80

    route:
      app:
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/icon: vaultwarden.svg
          gethomepage.dev/name: Vaultwarden
          gethomepage.dev/group: Self-Hosted
        hostnames:
          - *domain_name
        parentRefs:
          - name: envoy
            namespace: envoy-system

    persistence:
      data:
        existingClaim: '{{ .Release.Name }}'

      tmp:
        type: emptyDir
