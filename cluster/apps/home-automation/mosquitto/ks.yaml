---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mosquitto
  namespace: home-automation
spec:
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph

  postBuild:
    substitute:
      APP: *app
      CONTROLLER: StatefulSet

  prune: true
  interval: 1h
  path: cluster/apps/home-automation/mosquitto
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
