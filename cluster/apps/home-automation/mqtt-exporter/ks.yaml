---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mqtt-exporter
  namespace: home-automation
spec:
  dependsOn:
    - name: mosquitto

  prune: true
  interval: 1h
  path: cluster/apps/home-automation/mqtt-exporter
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
