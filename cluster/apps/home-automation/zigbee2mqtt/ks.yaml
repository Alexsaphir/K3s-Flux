---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app zigbee2mqtt
  namespace: home-automation
spec:
  components:
    - ../../../components/volsync

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 5Gi

  dependsOn:
    - name: mosquitto

  prune: true
  interval: 1h
  path: cluster/apps/home-automation/zigbee2mqtt
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
