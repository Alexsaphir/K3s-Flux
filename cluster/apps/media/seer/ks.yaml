---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app seer
  namespace: media
spec:
  components:
    - ../../../components/nfs-scaler
    - ../../../components/volsync

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 5Gi

  dependsOn:
    - name: longhorn
      namespace: longhorn-system
    #- name: plex
    #- name: sonarr
    #- name: radarr

  prune: true
  interval: 1h
  path: cluster/apps/media/seer
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
