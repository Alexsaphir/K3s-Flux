---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cleanarr
  namespace: media
spec:
  dependsOn:
    - name: plex

  prune: true
  interval: 1h
  path: cluster/apps/media/arr/cleanarr
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
