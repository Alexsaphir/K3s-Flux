---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app radarr
  namespace: media
spec:
  components:
    - ../../../../components/nfs-scaler
    - ../../../../components/volsync

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 10Gi

  dependsOn:
    - name: prowlarr

  prune: true
  interval: 1h
  path: cluster/apps/media/arr/radarr
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
