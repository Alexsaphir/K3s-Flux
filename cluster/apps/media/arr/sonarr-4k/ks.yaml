---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sonarr-4k
  namespace: &namespace media
spec:
  components:
    - ../../../../components/nfs-scaler
    - ../../../../components/volsync

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 10Gi

  dependsOn:
    - name: longhorn
      namespace: longhorn-system
    - name: prowlarr

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true

  targetNamespace: *namespace
  path: cluster/apps/media/arr/sonarr-4k
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
