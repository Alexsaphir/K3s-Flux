---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prowlarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: prowlarr-secret
    template:
      data:
        PROWLARR__AUTH__APIKEY: '{{ .PROWLARR_API_KEY }}'

  dataFrom:
    - extract:
        key: prowlarr
