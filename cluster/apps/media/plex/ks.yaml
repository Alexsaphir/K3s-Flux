---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app plex
  namespace: media
spec:
  components: [ ]
  # - ../../../components/nfs-scaler

  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 100Gi

  prune: true
  interval: 1h
  path: cluster/apps/media/plex
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
