---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tautulli
  namespace: media
spec:
  components:
    - ../../../components/volsync

  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph

    - name: plex

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 20Gi

  prune: true
  interval: 1h
  path: cluster/apps/media/tautulli
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
