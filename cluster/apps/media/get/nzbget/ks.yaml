---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nzbget
  namespace: media
spec:
  components:
    - ../../../../components/nfs-scaler
    - ../../../../components/volsync

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 1Gi

  dependsOn:
    - name: longhorn
      namespace: longhorn-system

  prune: true
  interval: 1h
  path: cluster/apps/media/get/nzbget
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
