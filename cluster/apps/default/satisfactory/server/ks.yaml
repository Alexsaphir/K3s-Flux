---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app satisfactory
  namespace: &namespace satisfactory
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
      app.kubernetes.io/component: *app

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  dependsOn:
    - name: cert-manager
      namespace: cert-manager
    - name: openebs
      namespace: openebs-system

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true

  targetNamespace: *namespace
  path: cluster/apps/default/satisfactory/server
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
