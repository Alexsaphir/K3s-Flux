---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ollama-ui
  namespace: ai
spec:
  dependsOn:
    - name: ollama

  prune: true
  interval: 1h
  path: cluster/apps/ai/ollama-ui
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
