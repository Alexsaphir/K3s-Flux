---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app renovate-jobs
  namespace: renovate
spec:
  dependsOn:
    - name: renovate-operator

  postBuild:
    substitute:
      APP: *app

  prune: true
  interval: 1h
  path: cluster/apps/dev/renovate-operator/jobs
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
