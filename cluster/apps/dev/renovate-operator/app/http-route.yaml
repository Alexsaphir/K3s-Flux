---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &name renovate-operator
spec:
  # noinspection KubernetesUnknownValues
  hostnames: [ 'renovate-operator.${DOMAIN_NAME}' ]
  parentRefs:
    - name: envoy
      namespace: envoy-system
  rules:
    - backendRefs:
        - name: *name
          port: 8081
