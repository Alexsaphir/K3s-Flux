---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &name renovate-operator
spec:
  # noinspection KubernetesUnknownValues
  hostnames: [ 'renovate.${DOMAIN_NAME}' ]
  parentRefs:
    - name: envoy
      namespace: envoy-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: '/webhook'
      backendRefs:
        - name: *name
          port: 8082

    - matches:
        - path:
            type: PathPrefix
            value: '/'
      backendRefs:
        - name: *name
          port: 8081
