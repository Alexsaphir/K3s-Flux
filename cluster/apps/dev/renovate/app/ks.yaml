---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app renovate
  namespace: renovate
spec:
  postBuild:
    substitute:
      APP: *app

  prune: true
  interval: 1h
  path: cluster/apps/dev/renovate/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
