---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - external-secret.yaml
  - secret.sops.yaml
  - helm-release.yaml
  - tcp-route.yaml

configMapGenerator:
  - name: gitlab-config-tpl
    files:
      - config/config.rb

generatorOptions:
  disableNameSuffixHash: true
