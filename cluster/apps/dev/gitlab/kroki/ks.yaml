---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kroki
  namespace: gitlab
spec:
  postBuild:
    substitute:
      APP: *app

  prune: true
  interval: 1h
  path: cluster/apps/dev/gitlab/kroki
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
