---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app postgres-codecov
  namespace: &namespace codecov
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg

  healthChecks:
    - apiVersion: v1
      kind: Pod
      name: postgres-codecov-1
      namespace: *namespace

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true

  targetNamespace: *namespace
  path: cluster/apps/dev/codecov/postgres
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
