---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app codecov
  namespace: &namespace codecov
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: timescaledb
      namespace: database

  postBuild:
    substitute:
      APP: *app

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true

  targetNamespace: *namespace
  path: cluster/apps/dev/codecov/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
