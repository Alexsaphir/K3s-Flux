---
apiVersion: db.movetokube.com/v1alpha1
kind: Postgres
metadata:
  name: &app codecov
  annotations:
    postgres.db.movetokube.com/instance: timescaledb
spec:
  database: *app # db name in postgres cluster
  dropOnDelete: false
  extensions:
    - timescaledb
---
apiVersion: db.movetokube.com/v1alpha1
kind: PostgresUser
metadata:
  name: &app codecov
  annotations:
    postgres.db.movetokube.com/instance: timescaledb

spec:
  role: *app
  database: *app # references the CR
  secretName: database
  privileges: OWNER
