---
loki:
  enable: false
alloy:
  enable: false
minio:
  enabled: false

localpv-provisioner:
  localpv:
    image:
      registry: quay.io/
    basePath: &hostPath /var/lib/local/openebs/local

  hostpathClass:
    enabled: true
    name: openebs-hostpath
    isDefaultClass: false
    basePath: *hostPath

    xfsQuota:
      enabled: true

  helperPod:
    image:
      registry: quay.io/

openebs-crds:
  csi:
    volumeSnapshots:
      enabled: false
      keep: false

zfs-localpv:
  enabled: false

lvm-localpv:
  enabled: false

mayastor:
  enabled: false

engines:
  local:
    lvm:
      enabled: false
    zfs:
      enabled: false
  replicated:
    mayastor:
      enabled: false
