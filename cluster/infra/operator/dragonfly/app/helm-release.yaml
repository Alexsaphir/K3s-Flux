---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: dragonfly-operator

  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3

  values:
    replicaCount: 1

    crds:
      install: true
      keep: false

    additionalLabels:
      app: dragonfly-operator

    manager:
      resources:
        limits:
          cpu: 500m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 64Mi

    podSecurityContext:
      runAsNonRoot: true
      seccompProfile: { type: RuntimeDefault }

    serviceMonitor:
      enabled: true

    grafanaDashboard:
      enabled: true
      folder: Storage
      # -- Grafana dashboard configmap annotations.
      annotations:
        name: grafana_folder

      labels:
        name: grafana_dashboard
