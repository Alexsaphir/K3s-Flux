---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: minio
  namespace: minio-system
spec:
  components:
    - ../../../components/volsync

  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph

  postBuild:
    substitute:
      PVC_NAME: minio-data
      VOLSYNC_CAPACITY: 200Gi

  prune: true
  wait: false
  interval: 1h
  path: cluster/infra/minio-system/minio
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
