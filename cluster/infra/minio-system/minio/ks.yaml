---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: minio
  namespace: minio-system
spec:
  components:
    - ../../../components/volsync

  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph

  postBuild:
    substitute:
      PVC_NAME: minio
      VOLSYNC_CAPACITY: &capacity 200Gi
      VOLSYNC_CACHE_CAPACITY: *capacity
      VOLSYNC_PUID: '0'
      VOLSYNC_PGID: '0'

  prune: true
  wait: false
  interval: 1h
  path: cluster/infra/minio-system/minio
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
