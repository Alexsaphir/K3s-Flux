---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: minio-secret
    template:
      data:
        MINIO_ROOT_USER: '{{ .MINIO_ROOT_USER }}'
        MINIO_ROOT_PASSWORD: '{{ .MINIO_ROOT_PASSWORD }}'

  dataFrom:
    - extract:
        key: minio
