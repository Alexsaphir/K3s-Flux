---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: minio
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.2
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: minio

  values:
    controllers:
      minio:
        annotations:
          reloader.stakater.com/auto: 'true'

        containers:
          app:
            image:
              repository: quay.io/minio/minio
              tag: RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e

            args: [ 'server', '/data', '--console-address', ':9001' ]

            envFrom:
              - secretRef:
                  name: '{{ .Release.Name }}-secret'

            env:
              TZ: '${TIMEZONE}'

              MINIO_UPDATE: 'off'
              MINIO_API_CORS_ALLOW_ORIGIN: https://minio.${DOMAIN_NAME},https://s3.${DOMAIN_NAME}
              MINIO_BROWSER_REDIRECT_URL: https://minio.${DOMAIN_NAME}
              MINIO_SERVER_URL: https://s3.${DOMAIN_NAME}

              MINIO_REGION_NAME: us-east-1

              MINIO_PROMETHEUS_JOB_ID: minio
              MINIO_PROMETHEUS_AUTH_TYPE: public
              MINIO_PROMETHEUS_URL: http://prometheus-operated.observability.svc.cluster.local:9090

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /minio/health/live
                    port: 9000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness: *probes

            resources:
              requests:
                memory: 100Mi
                cpu: 100m

    defaultPodOptions:
      securityContext:
        fsGroupChangePolicy: 'OnRootMismatch'
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: minio.svc.talos.${DOMAIN_NAME}
        ports:
          http:
            port: 9001
          api:
            enabled: true
            port: 9000

    route:
      app:
        hostnames: [ 'minio.talos.${DOMAIN_NAME}' ]
        parentRefs:
          - name: envoy
            namespace: envoy-system
        rules:
          - backendRefs:
              - identifier: app
                port: 9001

      s3:
        hostnames: [ 's3.talos.${DOMAIN_NAME}' ]
        parentRefs:
          - name: envoy
            namespace: envoy-system
        rules:
          - backendRefs:
              - identifier: app
                port: 9000


    persistence:
      config:
        existingClaim: minio
        globalMounts:
          - path: /data
