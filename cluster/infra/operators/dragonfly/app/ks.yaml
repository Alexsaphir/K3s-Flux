---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app dragonfly-operator
  namespace: &namespace dragonfly-operator
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  prune: true
  wait: true

  targetNamespace: *namespace
  path: cluster/infra/operators/dragonfly/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
