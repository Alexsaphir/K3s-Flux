---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cnpg-barman-cloud-crds
  namespace: &namespace cloudnative-pg
  labels:
    substitution.flux.home.arpa/disabled: 'true'
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  healthChecks:
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: objectstores.barmancloud.cnpg.io

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true

  targetNamespace: *namespace
  sourceRef:
    kind: GitRepository
    name: *app
    namespace: *namespace

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cnpg-barman-cloud
  namespace: &namespace cloudnative-pg
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true
  wait: true

  targetNamespace: *namespace
  path: cluster/infra/operators/cloudnative-pg/cnpg-barman-cloud
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
