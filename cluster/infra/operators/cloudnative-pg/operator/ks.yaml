---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cloudnative-pg-operator
  namespace: &namespace cloudnative-pg
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true
  wait: true

  targetNamespace: *namespace
  path: cluster/infra/operators/cloudnative-pg/operator
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
