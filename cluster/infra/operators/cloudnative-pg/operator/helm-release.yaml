---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cloudnative-pg
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.27.1
  url: oci://ghcr.io/cloudnative-pg/charts/cloudnative-pg
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: cloudnative-pg

  driftDetection:
    mode: enabled
    ignore:
      # Ignore the 'validated' annotation which is not inserted during installation
      - paths: [ '/metadata/annotations/prometheus-operator-validated' ]
        target:
          kind: PrometheusRule

  values:
    crds:
      create: true

    monitoring:
      podMonitorEnabled: true
      grafanaDashboard:
        create: true
        mode: GrafanaOperator
        grafanaOperator:
          matchLabels:
            grafana.internal/instance: grafana
