---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
  namespace: cloudnative-pg
spec:
  dependsOn:
    - name: cnpg-barman-cloud
    - name: cloudnative-pg-operator

  prune: true
  wait: true
  interval: 1h
  path: cluster/infra/operators/cloudnative-pg/cloudnative-pg
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
