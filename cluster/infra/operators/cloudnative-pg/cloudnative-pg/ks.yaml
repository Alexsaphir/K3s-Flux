---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cloudnative-pg
  namespace: &namespace cloudnative-pg
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: cnpg-barman-cloud-crds
    - name: cnpg-barman-cloud
    - name: cloudnative-pg-operator

  prune: true
  wait: true

  targetNamespace: *namespace
  path: cluster/infra/operators/cloudnative-pg/cloudnative-pg
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
