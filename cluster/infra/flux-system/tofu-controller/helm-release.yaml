---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: tofu-controller
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.16.0-rc.7
  url: oci://ghcr.io/flux-iac/charts/tofu-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: tofu-controller

  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace

  values:
    runner:
      image:
        repository: ghcr.io/home-operations/opentofu-runner
        tag: 1.11.3@sha256:8e1ae8d223b986ca784f3ed1d5ed520c33b7c379484f6f3be6d89012c115f223

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 1m
