---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux
spec:
  # noinspection KubernetesUnknownValues
  hostnames: [ 'flux.talos.${DOMAIN_NAME}' ]
  parentRefs:
    - name: envoy
      namespace: envoy-system
  rules:
    - backendRefs:
        - name: flux-operator
          port: 9080
