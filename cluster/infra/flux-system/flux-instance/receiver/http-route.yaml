---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitlab-webhook
spec:
  hostnames: [ 'flux-webhook.talos.${DOMAIN_NAME}' ]
  parentRefs:
    - name: main
      namespace: envoy-system
      sectionName: https
  rules:
    - backendRefs:
        - name: webhook-receiver
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /hook/
