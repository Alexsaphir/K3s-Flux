---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-instance
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-operator

  prune: true
  wait: false
  interval: 1h
  path: cluster/infra/flux-system/flux-instance
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
