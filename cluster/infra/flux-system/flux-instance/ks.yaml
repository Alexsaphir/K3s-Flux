---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app flux-instance
  namespace: &namespace flux-system
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: flux-operator
      namespace: *namespace

  prune: true
  wait: false

  targetNamespace: *namespace
  path: cluster/infra/flux-system/flux-instance
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
