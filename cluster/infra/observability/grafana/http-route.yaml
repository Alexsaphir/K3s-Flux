---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
spec:
  # noinspection KubernetesUnknownValues
  hostnames: [ 'grafana.talos.${DOMAIN_NAME}' ]

  parentRefs:
    - name: envoy
      namespace: envoy-system
      sectionName: https
  rules:
    - backendRefs:
        - name: grafana-service
          port: 3000
