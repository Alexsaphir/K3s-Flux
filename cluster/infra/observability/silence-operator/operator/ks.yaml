---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app silence-operator
  namespace: &namespace observability
spec:
  dependsOn:
    - name: kube-prometheus-stack

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/observability/silence-operator/operator
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
