---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: silences
  namespace: observability
spec:
  dependsOn:
    - name: silence-operator

  prune: true
  interval: 1h
  path: cluster/infra/observability/silence-operator/silences
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
