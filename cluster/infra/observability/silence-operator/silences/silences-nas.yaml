---
apiVersion: monitoring.giantswarm.io/v1alpha1
kind: Silence
metadata:
  name: nas-disk-high-utilization-disk
spec:
  matchers:
    - name: alertname
      value: NodeFilesystemAlmostOutOfSpace
      isRegex: false

    - name: instance
      value: nas.hosts.alexsaphir.com:9100
      isRegex: false

    - name: mountpoint
      value: '^/mnt/disk[0-9]+'
      isRegex: true

---
apiVersion: monitoring.giantswarm.io/v1alpha1
