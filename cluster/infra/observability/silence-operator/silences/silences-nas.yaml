spec:
  matchers:
    - name: alertname
      value: NodeFilesystemAlmostOutOfSpace
      isRegex: false

    - name: instance
      value: nas.hosts.alexsaphir.com:9100
      isRegex: false

    - name: device
      value: fuse.shfs
      isRegex: false

---
apiVersion: monitoring.giantswarm.io/v1alpha1
kind: Silence
