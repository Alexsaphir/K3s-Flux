---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unpoller
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: unpoller-secret
    template:
      data:
        UP_UNIFI_DEFAULT_API_KEY: '{{ .UNIFI_UNPOLLER_API_KEY }}'

  dataFrom:
    - extract:
        key: unifi
