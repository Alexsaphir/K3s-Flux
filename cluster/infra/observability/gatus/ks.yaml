---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gatus
  namespace: &namespace observability
spec:
  dependsOn:
    - name: ext-postgres-operator
      namespace: database

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/observability/gatus
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
