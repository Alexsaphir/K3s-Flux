---
metrics: true
debug: true

web:
  port: $${WEB_PORT}

storage:
  type: postgres
  path: $${POSTGRES_URL}
  caching: true

ui:
  title: Status | Gatus
  header: Status

alerting:
  pushover:
    title: Gatus
    application-token: $${PUSHOVER_TOKEN}
    user-key: $${PUSHOVER_USER_KEY}
    priority: 1
    default-alert:
      description: health-check failed
      send-on-resolved: true
      failure-threshold: 3
      success-threshold: 3

connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: status
    group: external
    url: https://status.talos.${DOMAIN_NAME}
    interval: 1m
    client:
      timeout: 60s
      dns-resolver: tcp://192.168.0.1:53
    conditions:
      - "[STATUS] == 200"
