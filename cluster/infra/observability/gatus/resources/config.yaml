---
metrics: true

web:
  port: $${GATUS_WEB_PORT}

storage:
  type: postgres
  path: $${POSTGRES_URL}
  caching: true

ui:
  title: Status | Gatus
  header: Status
  link: https://github.com/Alexsaphir
  buttons:
    - name: Github
      link: https://github.com/Alexsaphir
    - name: Homelab
      link: https://gitlab.alexsaphir.com/Homelab/Talos-Flux

alerting:
  pushover:
    title: Gatus
    application-token: $${PUSHOVER_TOKEN}
    user-key: $${PUSHOVER_USER_KEY}
    priority: 1
    default-alert:
      description: health-check failed
      send-on-resolved: true
      failure-threshold: 3
      success-threshold: 3

connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  - name: Cloudflare
    group: connectivity
    url: icmp://1.1.1.1
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Google
    group: connectivity
    url: icmp://8.8.8.8
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Quad9
    group: connectivity
    url: icmp://9.9.9.9
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: status
    group: external
    url: https://status.talos.${DOMAIN_NAME}
    interval: 1m
    client:
      timeout: 60s
      dns-resolver: tcp://192.168.0.1:53
    conditions:
      - "[STATUS] == 200"
