---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app victoria-logs
  namespace: &namespace observability
spec:
  dependsOn:
    - name: longhorn
      namespace: longhorn-system

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/observability/victoria-logs
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
