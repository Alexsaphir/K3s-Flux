---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app volsync-maintenance
  namespace: &namespace volsync-system
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: volsync

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/volsync-system/maintenance
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
