---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-maintenance
  namespace: volsync-system
spec:
  dependsOn:
    - name: volsync

  prune: true
  interval: 1h
  path: cluster/infra/volsync-system/maintenance
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
