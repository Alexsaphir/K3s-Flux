---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopia
  namespace: volsync-system
spec:
  components:
    - ../../../components/nfs-scaler

  dependsOn:
    - name: volsync

  postBuild:
    substitute:
      APP: kopia

  prune: true
  interval: 1h
  path: cluster/infra/volsync-system/kopia
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
