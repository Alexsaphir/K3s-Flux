---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kopia
  namespace: &namespace volsync-system
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  components:
    - ../../../../components/nfs-scaler

  dependsOn:
    - name: volsync

  postBuild:
    substitute:
      APP: kopia

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/volsync-system/kopia
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
