---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app volsync
  namespace: &namespace volsync-system
spec:
  dependsOn:
    - name: snapshot-controller
      namespace: kube-system

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/volsync-system/volsync
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
