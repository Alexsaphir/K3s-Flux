---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-operator
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: operator-oauth
    template:
      data:
        client_id: '{{ .TAILSCALE_CLIENT_ID }}'
        client_secret: '{{ .TAILSCALE_CLIENT_SECRET }}'

  dataFrom:
    - extract:
        key: tailscale-operator
