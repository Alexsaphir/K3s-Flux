---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-frontend
spec:
  # noinspection KubernetesUnknownValues
  hostnames: [ 'longhorn.talos.${DOMAIN_NAME}' ]
  parentRefs:
    - name: envoy
      namespace: envoy-system
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
