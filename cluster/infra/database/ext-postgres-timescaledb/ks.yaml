---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app ext-postgres-timescaledb
  namespace: &namespace database
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: ext-postgres-operator
    - name: timescaledb

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/database/ext-postgres-timescaledb
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
