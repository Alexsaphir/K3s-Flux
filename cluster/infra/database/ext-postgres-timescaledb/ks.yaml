---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ext-postgres-timescaledb
  namespace: database
spec:
  dependsOn:
    - name: ext-postgres-operator
    - name: timescaledb

  prune: true
  interval: 1h
  path: cluster/infra/database/ext-postgres-timescaledb
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
