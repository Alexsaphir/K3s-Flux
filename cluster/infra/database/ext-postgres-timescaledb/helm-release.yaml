---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ext-postgres-timescaledb
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: ext-postgres-operator

  install:
    crds: Skip
  upgrade:
    crds: Skip

  valuesFrom:
    - kind: Secret
      name: timescaledb-superuser
      valuesKey: username
      targetPath: postgres.user
    - kind: Secret
      name: timescaledb-superuser
      valuesKey: password
      targetPath: postgres.password

  values:
    podAnnotations:
      reloader.stakater.com/auto: 'true'

    postgres:
      host: timescaledb-rw.database.svc.cluster.local
      default_database: 'postgres'

    env:
      POSTGRES_INSTANCE: timescaledb

    resources:
      requests:
        cpu: 5m
        memory: 32M
