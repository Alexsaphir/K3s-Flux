---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: &name postgres
  annotations:
    kyverno.io/ignore: 'true'
    cnpg.io/skipEmptyWalArchiveCheck: 'enabled'

spec:
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql
    major: 18

  instances: 3
  enablePDB: true

  superuserSecret:
    name: postgres-superuser
  enableSuperuserAccess: true

  postgresql:
    parameters:
      max_connections: '200'
      max_slot_wal_keep_size: 5GB
      shared_buffers: '128MB'

    extensions:
      - name: vchord
        image:
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.1.1@sha256:bdea43bed2a414e21bbf71767bf6f0739747ac480b267b51772dc214ac28dcb3
        dynamic_library_path:
          - /usr/lib/postgresql/18/lib
        extension_control_path:
          - /usr/share/postgresql/18/

    shared_preload_libraries:
      - 'vchord.so'

  bootstrap:
    recovery:
      source: source

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: minio-store

  externalClusters:
    - name: source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: minio-store
          serverName: *name

  resources:
    requests:
      memory: '2Gi'
    limits:
      hugepages-2Mi: '512Mi'

  storage:
    size: 10Gi
    storageClass: openebs-hostpath

  managed:
    services:
      disabledDefaultServices: [ 'ro', 'r' ]
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: postgres-lb
              annotations:
                external-dns.alpha.kubernetes.io/hostname: postgres.svc.talos.${DOMAIN_NAME}

            spec:
              type: LoadBalancer
              ipFamilyPolicy: PreferDualStack
              externalTrafficPolicy: Local

---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: &cluster postgres
spec:
  podMetricsEndpoints:
    - port: metrics
  selector:
    matchLabels:
      cnpg.io/cluster: *cluster
      cnpg.io/podRole: instance
