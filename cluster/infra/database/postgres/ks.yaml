---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app postgres
  namespace: &namespace database
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: cloudnative-pg
      namespace: cloudnative-pg

  healthChecks:
    - apiVersion: v1
      kind: Pod
      name: postgres-1
      namespace: *namespace

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/database/postgres
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
