---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app unifi-dns
  namespace: &namespace external-dns
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  wait: false

  targetNamespace: *namespace
  path: cluster/infra/external-dns/unifi-dns
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
