---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: &name bitwarden-tls-certs
spec:
  secretName: *name

  duration: 168h # 7d
  renewBefore: 49h # 2d + a bit

  dnsNames:
    - bitwarden-sdk-server.external-secrets.svc.cluster.local
    - localhost

  ipAddresses:
    - 127.0.0.1
    - ::1

  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
    rotationPolicy: Always

  issuerRef:
    name: cluster-signed-issuer
    kind: ClusterIssuer
    group: cert-manager.io
