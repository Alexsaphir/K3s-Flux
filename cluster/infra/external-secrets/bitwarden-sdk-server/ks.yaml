---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bitwarden-sdk-server
  namespace: &namespace external-secrets
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: external-secrets
      namespace: *namespace

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true
  wait: false

  targetNamespace: *namespace
  path: cluster/infra/external-secrets/bitwarden-sdk-server
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
