---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bitwarden-sdk-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: bitwarden-sdk-server

  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3

  values:
    replicaCount: 1

    image:
      tls:
        enabled: false # TODO: Use tls certificates!

    securityContext:
      capabilities: { drop: [ 'ALL' ] }
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
