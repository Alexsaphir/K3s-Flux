---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app garage
  namespace: &namespace garage
spec:
  components:
    - ../../../components/volsync

  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 300Gi

  prune: true
  interval: 1h
  path: cluster/infra/garage/garage
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
