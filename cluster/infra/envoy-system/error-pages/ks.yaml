---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app error-pages
  namespace: &namespace envoy-system
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/envoy-system/error-pages
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
