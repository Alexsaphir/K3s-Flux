---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: envoy-all
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway

  compressor:
    - type: Brotli
      brotli: {}
    - type: Gzip
      gzip: {}
    - type: Zstd
      zstd: {}

  connection:
    bufferLimit: 8Mi

  tcpKeepalive: { }

  timeout:
    http:
      requestTimeout: 0s

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy-all
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway

  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1

  tls:
    minVersion: "1.2"
    alpnProtocols:
      - h2
      - http/1.1

  http2:
    initialStreamWindowSize: 2Mi
    initialConnectionWindowSize: 32Mi
    onInvalidMessage: TerminateStream

  http3: { }

  tcpKeepalive: { }

  connection:
    bufferLimit: 8Mi
    maxAcceptPerSocketEvent: 0

  timeout:
    http:
      requestReceivedTimeout: 0s
