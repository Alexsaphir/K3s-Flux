---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: envoy-all
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway

  compression:
    - type: Brotli
    - type: Gzip

  connection:
    bufferLimit: 64Mi

  tcpKeepalive: { }

  timeout:
    http:
      requestTimeout: 0s

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy-all
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway

  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1

  tls:
    minVersion: "1.2"
    alpnProtocols:
      - h2
      - http/1.1

  http2:
    onInvalidMessage: TerminateStream

  http3: { }

  tcpKeepalive: { }

  timeout:
    http:
      requestReceivedTimeout: 0s
