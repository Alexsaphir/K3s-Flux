---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: envoy-all
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway

  compressor:
    - type: Brotli
      brotli: { }
    - type: Gzip
      gzip: { }
    - type: Zstd
      zstd: { }

  retry:
    numRetries: 2
    retryOn:
      triggers:
        - reset

  tcpKeepalive: { }

  timeout:
    http:
      requestTimeout: 0s

  # Custom error page redirects - applies to all routes by default
  responseOverride:
    # 401 Unauthorized
    - match:
        statusCodes:
          - type: Value
            value: 401
      redirect:
        scheme: https
        # noinspection KubernetesUnknownValues
        hostname: &host 'error-pages.talos.${DOMAIN_NAME}'
        path:
          type: ReplaceFullPath
          replaceFullPath: /401.html
        statusCode: 302

    # 403 Forbidden
    - match:
        statusCodes:
          - type: Value
            value: 403
      redirect:
        scheme: https
        hostname: *host
        path:
          type: ReplaceFullPath
          replaceFullPath: /403.html
        statusCode: 302

    # 404 Not Found
    - match:
        statusCodes:
          - type: Value
            value: 404
      redirect:
        scheme: https
        hostname: *host
        path:
          type: ReplaceFullPath
          replaceFullPath: /404.html
        statusCode: 302

    # 500 Internal Server Error
    - match:
        statusCodes:
          - type: Value
            value: 500
      redirect:
        scheme: https
        hostname: *host
        path:
          type: ReplaceFullPath
          replaceFullPath: /500.html
        statusCode: 302

    # 502 Bad Gateway
    - match:
        statusCodes:
          - type: Value
            value: 502
      redirect:
        scheme: https
        hostname: *host
        path:
          type: ReplaceFullPath
          replaceFullPath: /502.html
        statusCode: 302

    # 503 Service Unavailable
    - match:
        statusCodes:
          - type: Value
            value: 503
      redirect:
        scheme: https
        hostname: *host
        path:
          type: ReplaceFullPath
          replaceFullPath: /503.html
        statusCode: 302

    # 504 Gateway Timeout
    - match:
        statusCodes:
          - type: Value
            value: 504
      redirect:
        scheme: https
        hostname: *host
        path:
          type: ReplaceFullPath
          replaceFullPath: /504.html
        statusCode: 302


---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy-all
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway

  clientIPDetection:
    xForwardedFor:
      trustedCIDRs:
        - 10.42.0.0/16
        - fdd5:aa8:9535:42::/108

  tls:
    minVersion: "1.2"
    alpnProtocols:
      - h2
      - http/1.1

  http2:
    onInvalidMessage: TerminateStream

  http3: { }

  tcpKeepalive: { }
