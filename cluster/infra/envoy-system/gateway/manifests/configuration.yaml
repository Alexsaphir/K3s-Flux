---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: config
spec:
  logging:
    level:
      default: info

  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 1

      envoyService:
        name: envoy-gateway-envoy
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
                - name: metrics
                  port: 19001
                  targetPort: 19001
                  protocol: TCP
