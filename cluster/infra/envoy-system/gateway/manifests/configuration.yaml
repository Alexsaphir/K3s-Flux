---
# yaml-language-server: $schema=https://raw.githubusercontent.com/envoyproxy/gateway/refs/heads/main/charts/gateway-helm/crds/generated/gateway.envoyproxy.io_envoyproxies.yaml
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: config
spec:
  logging:
    level:
      default: info

  ipFamily: DualStack

  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 1

        container:
          image: mirror.gcr.io/envoyproxy/envoy:v1.36.1

          resources:
            requests:
              cpu: 100m
            limits:
              memory: 1Gi

      envoyService:
        name: envoy-gateway-envoy
        externalTrafficPolicy: Cluster # Cilium's L2 announce doesn't support Local, since it announces on a different node than the pod is running on https://github.com/cilium/cilium/issues/27800
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
                - name: metrics
                  port: 19001
                  targetPort: 19001
                  protocol: TCP
