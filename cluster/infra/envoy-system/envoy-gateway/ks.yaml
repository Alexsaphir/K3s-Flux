---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app envoy-gateway
  namespace: &namespace envoy-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/envoy-system/envoy-gateway
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
