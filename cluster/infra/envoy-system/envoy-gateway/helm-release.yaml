---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: envoy-gateway
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: v1.6.0
  url: oci://mirror.gcr.io/envoyproxy/gateway-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: envoy-gateway

  values:
    deployment:
      replicas: 1

    config:
      envoyGateway:
        extensionApis:
          enableEnvoyPatchPolicy: true

        gateway:
          controllerName: gateway.envoyproxy.io/gatewayclass-controller

        provider:
          type: Kubernetes

      logging:
        level:
          default: info
