---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
spec:
  # noinspection KubernetesUnknownValues
  hostnames: [ 'sso.talos.${DOMAIN_NAME}' ]
  parentRefs:
    - name: envoy
      namespace: envoy-system
      sectionName: https
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
