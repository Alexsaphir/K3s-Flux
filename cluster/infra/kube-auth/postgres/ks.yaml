---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app postgres
  namespace: &namespace kube-auth
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn: []

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/kube-auth/postgres
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
