---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: &name postgres-authentik
  annotations:
    kyverno.io/ignore: 'true'
    cnpg.io/skipEmptyWalArchiveCheck: 'enabled'

spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5-9

  instances: 1
  enablePDB: false # TODO: Remove when more than 1 node.

  enableSuperuserAccess: false

  bootstrap:
    #    initdb:
    #      database: authentik
    #      owner: authentik
    #
    #      dataChecksums: true
    #
    #      secret:
    #        name: postgres-authentik-secret

    recovery:
      source: source

  postgresql:
    parameters:
      max_connections: '800'
      max_slot_wal_keep_size: 10GB
      shared_buffers: '512MB'

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: minio-store

  externalClusters:
    - name: source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: minio-store
          serverName: *name
  resources:
    requests:
      memory: '2Gi'

  storage:
    size: 10Gi
    storageClass: openebs-hostpath

  monitoring:
    enablePodMonitor: true
