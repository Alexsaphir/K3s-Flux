---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app authelia
  namespace: &namespace kube-auth
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: lldap

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/kube-auth/authelia
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
