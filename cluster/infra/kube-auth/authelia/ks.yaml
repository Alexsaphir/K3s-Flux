kind: Kustomization
metadata:
  name: &app authelia
  namespace: &namespace kube-auth
spec:
  dependsOn:
    - name: lldap

#  healthChecks:
#    - apiVersion: helm.toolkit.fluxcd.io/v2
#      kind: HelmRelease
#      name: *app
#      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/kube-auth/authelia
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
