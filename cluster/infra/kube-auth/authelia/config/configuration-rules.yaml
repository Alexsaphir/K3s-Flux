---
# yaml-language-server: $schema=https://raw.githubusercontent.com/authelia/authelia/master/docs/static/schemas/v4.39/json-schema/configuration.json
access_control:
  default_policy: deny
  networks:
    - name: internal
      networks: [ '192.168.0.0/16' ]

  rules:
    - domain:
        - 'auth.${DOMAIN_NAME}'
        - 'homer.${DOMAIN_NAME}'
        - 'vaultwarden.${DOMAIN_NAME}'
      policy: bypass
    - domain:
        - 'lldap.${DOMAIN_NAME}'
      policy: two_factor


    # Expose public metrics
    - domain:
        - 'status.${DOMAIN_NAME}'
        - 'kromgo.${DOMAIN_NAME}'
      policy: bypass

    - domain:
        - 'minio.${DOMAIN_NAME}'
        - 's3.${DOMAIN_NAME}'
        - 'gitlab.${DOMAIN_NAME}'
      policy: bypass


    # Public ingresses using oauth
    - domain:
        - 'photos.${DOMAIN_NAME}'
        - 'recipes.${DOMAIN_NAME}'
      policy: bypass

    # Public media ingresses
    - domain:
        - 'plex.${DOMAIN_NAME}'
        - 'seer.${DOMAIN_NAME}'
        - 'spotify.${DOMAIN_NAME}'
        - 'tautulli.${DOMAIN_NAME}'
      policy: bypass


    # Webhook protected by secret
    - domain:
        - 'flux-webhook.${DOMAIN_NAME}'
      resources:
        - '^/hook([/?].*)?$'
      policy: bypass
    - domain:
        - 'renovate.${DOMAIN_NAME}'
      resources:
        - '^/webhook([/?].*)?$'
      policy: bypass
    # API protected with secret
    - domain_regex: '^(sonarr|radarr|prowlarr)\.${DOMAIN_NAME}$'
      policy: bypass
      resources:
        - "^/api([/?].*)?$"


    - domain:
        - '*.${DOMAIN_NAME}'
      policy: two_factor
      subject:
        - 'group:cluster-admins'
