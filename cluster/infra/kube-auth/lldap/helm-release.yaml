---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: lldap
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.1
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lldap
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      lldap:
        replicas: 2
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: 'true'

        containers:
          app:
            image:
              repository: ghcr.io/lldap/lldap
              tag: v0.6.2-alpine-rootless@sha256:35df821899ec54c11eaab395e9c68e191e2582592cba343b0a904f6821aadcd2
            env:
              TZ: '${TIMEZONE}'

              LLDAP_HTTP_PORT: &port 80
              LLDAP_HTTP_URL: https://{{ .Release.Name }}.talos.${DOMAIN_NAME}
              LLDAP_LDAP_PORT: &ldapPort 389
              LLDAP_VERBOSE: 'false'

              LLDAP_LDAP_BASE_DN: dc=home,dc=arpa

              LLDAP_SMTP_OPTIONS__ENABLE_PASSWORD_RESET: false

              LLDAP_DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: database-lldap
                    key: POSTGRES_URL

            envFrom:
              - secretRef:
                  name: '{{ .Release.Name }}-secret'

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ 'ALL' ] }

            resources:
              requests:
                cpu: 5m
                memory: 36M
              limits:
                memory: 128M

    defaultPodOptions:
      securityContext:
        seccompProfile: { type: RuntimeDefault }

        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: *app

    service:
      app:
        ports:
          http:
            port: *port
          ldap:
            port: *ldapPort

    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: |-
            conditions: ['[STATUS] == 200']
            group: auth
        hostnames: [ 'lldap.talos.${DOMAIN_NAME}' ]
        parentRefs:
          - name: envoy
            namespace: envoy-system

        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      data:
        type: emptyDir
