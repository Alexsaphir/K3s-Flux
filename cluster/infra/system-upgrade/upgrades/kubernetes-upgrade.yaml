---
apiVersion: tuppr.home-operations.com/v1alpha1
kind: KubernetesUpgrade
metadata:
  name: kubernetes
spec:
  kubernetes:
    # renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
    version: v1.34.0
  healthChecks:
    - # Nodes are ready
      apiVersion: v1
      kind: Node
      expr: status.conditions.filter(c, c.type == "Ready").all(c, c.status == "True")

    - # No active VolSync replications
      apiVersion: volsync.backube/v1alpha1
      kind: ReplicationSource
      expr: |-
        status.conditions.filter(c, c.type == "Synchronizing").all(c, c.status == "False")

    - # All longhorn volumes attached healthy
      apiVersion: longhorn.io/v1beta2
      kind: Volume
      expr: |-
        status.conditions.filter(c, c.state == "attached").all(c, c.robustness == "healthy")
