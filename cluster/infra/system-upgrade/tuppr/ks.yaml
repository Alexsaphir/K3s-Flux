---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tuppr
  namespace: &namespace system-upgrade
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/system-upgrade/tuppr
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
