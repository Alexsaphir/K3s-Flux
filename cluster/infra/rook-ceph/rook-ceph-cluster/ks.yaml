---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app rook-ceph-cluster
  namespace: &namespace rook-ceph
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: rook-ceph
      namespace: *namespace

    - name: volsync
      namespace: volsync-system

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/rook-ceph/rook-ceph-cluster
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
