---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rook-ceph-cluster
  namespace: rook-ceph
spec:
  dependsOn:
    - name: rook-ceph
    - name: volsync
      namespace: volsync-system

  prune: true
  interval: 1h
  path: cluster/infra/rook-ceph/rook-ceph-cluster
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
