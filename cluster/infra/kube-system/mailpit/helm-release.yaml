---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: mailpit
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.2
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mailpit
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: mailpit

  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      mailpit:
        annotations:
          reloader.stakater.com/auto: 'true'

        containers:
          app:
            image:
              repository: axllent/mailpit
              tag: v1.29.2

            args:
              - --db-file
              - /var/lib/mailpit/mailpit.db

            env:
              TIMEZONE: '${TIMEZONE}'

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ 'ALL' ] }

    service:
      app:
        ports:
          smtp:
            port: 1025
          http:
            port: 8025

    route:
      app:
        hostnames: [ 'mail.${DOMAIN_NAME}' ]
        parentRefs:
          - name: envoy
            namespace: envoy-system

    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /var/lib/mailpit
