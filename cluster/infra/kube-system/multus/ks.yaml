---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multus
  namespace: kube-system
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: multus
      namespace: kube-system
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: network-attachment-definitions.k8s.cni.cncf.io

  prune: true
  interval: 1h
  path: cluster/infra/kube-system/multus/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multus-networks
  namespace: kube-system
spec:
  dependsOn:
    - name: multus

  prune: true
  wait: true
  interval: 1h
  path: cluster/infra/kube-system/multus/networks
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
