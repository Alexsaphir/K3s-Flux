---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app multus
  namespace: &namespace kube-system
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: multus
      namespace: kube-system
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: network-attachment-definitions.k8s.cni.cncf.io

  prune: true

  targetNamespace: *namespace
  path: cluster/infra/kube-system/multus/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app multus-networks
  namespace: &namespace kube-system
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: multus

  prune: true
  wait: true

  targetNamespace: *namespace
  path: cluster/infra/kube-system/multus/networks
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
