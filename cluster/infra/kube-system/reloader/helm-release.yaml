---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: reloader

  driftDetection:
    mode: enabled
  maxHistory: 3
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    reloader:
      reloadStrategy: annotations

      enableHA: true
      readOnlyRootFileSystem: true
      deployment:
        replicas: 1


      podMonitor:
        enabled: true
        namespace: '{{ .Release.Namespace }}'
