---
apiVersion: v1
kind: Service
metadata:
  name: kube-api-cilium
  annotations:
    external-dns.alpha.kubernetes.io/hostname: talos.cluster.${DOMAIN_NAME}

spec:
  type: LoadBalancer
  ipFamilyPolicy: PreferDualStack
  externalTrafficPolicy: Local

  selector:
    k8s-app: kube-apiserver
    tier: control-plane

  ports:
    - port: 6443
