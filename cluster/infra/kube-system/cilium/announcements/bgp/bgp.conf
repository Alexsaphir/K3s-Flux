router bgp 64600
    bgp router-id 192.168.0.1

    no bgp ebgp-requires-policy
    no bgp default ipv4-unicast
    no bgp network import-check

    neighbor cilium peer-group
    neighbor cilium remote-as 65100

    neighbor cilium activate
    neighbor cilium soft-reconfiguration inbound
    neighbor cilium timers 15 45
    neighbor cilium timers connect 15

    neighbor 192.168.42.10 peer-group cilium
!
    address-family ipv4 unicast
        redistribute connected
        !
        neighbor cilium activate
        !
        neighbor cilium route-map ALLOW-ALL in
        neighbor cilium route-map ALLOW-ALL out
        !
        neighbor cilium next-hop-self
    exit-address-family
!
    address-family ipv6 unicast
        redistribute connected
        !
        neighbor cilium activate
        !
        neighbor cilium route-map ALLOW-ALL in
        neighbor cilium route-map ALLOW-ALL out
        !
        neighbor cilium next-hop-self
    exit-address-family

    route-map ALLOW-ALL permit 10
exit

