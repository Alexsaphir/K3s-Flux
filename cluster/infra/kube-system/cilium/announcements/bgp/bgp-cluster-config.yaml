---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
# Defines BGP instances and peer configurations that are applied to multiple nodes.
metadata:
  name: unifi-cilium-bgp
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux

  bgpInstances:
    - name: instance-65100
      localASN: 65100

      peers:
        - name: unifi-64600-ucgf
          peerASN: 64600
          peerAddress: 192.168.0.1
          peerConfigRef:
            name: unifi-cilium-peer
