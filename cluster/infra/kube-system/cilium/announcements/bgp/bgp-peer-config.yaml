---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
# A common set of BGP peering setting. It can be used across multiple peers.
metadata:
  name: unifi-cilium-peer-v4
spec:
  ebgpMultihop: 4

  timers:
    connectRetryTimeSeconds: 12
    holdTimeSeconds: 9
    keepAliveTimeSeconds: 3

  gracefulRestart:
    enabled: true
    restartTimeSeconds: 15

  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp

    - afi: ipv6
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp
