---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cilium
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.18.7
  url: oci://quay.io/cilium/charts/cilium
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: cilium

  values:
    cluster:
      id: 1
      name: main

    # Native routing for best eBPF performance
    routingMode: native
    autoDirectNodeRoutes: true
    ipv4NativeRoutingCIDR: '10.42.0.0/16'
    ipv6NativeRoutingCIDR: 'fdd5:aa8:9535:42::/108'

    # Talos specific
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    cgroup:
      automount:
        enabled: false  # TALOS REQUIRED - Talos provides mounts
      hostRoot: /sys/fs/cgroup
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - PERFMON
          - BPF
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
          - PERFMON
          - BPF

    # kube-proxy
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256

    # https://www.talos.dev/latest/talos-guides/network/host-dns/#forwarding-kube-dns-to-host-dns
    # https://docs.cilium.io/en/stable/operations/performance/tuning/#ebpf-host-routing
    bpfClockProbe: true
    bpf:
      datapathMode: netkit
      masquerade: true  # Required for installNoConntrackIptablesRules
      preallocateMaps: true

      # Policy enforcement acceleration
      policyMapMax: 65536    # Max policy entries

    # https://docs.cilium.io/en/stable/network/concepts/ipam/
    ipam:
      mode: kubernetes

    bgpControlPlane:
      enabled: true
    l2announcements:
      enabled: false
    loadBalancer:
      # https://docs.cilium.io/en/stable/network/kubernetes/kubeproxy-free/#maglev-consistent-hashing
      algorithm: maglev
      mode: dsr
      serviceTopology: true

    ipv4:
      enabled: true
    ipv6:
      enabled: true

    # -- Enable path MTU discovery
    pmtuDiscovery:
      enabled: true

    # PERFORMANCE - Bandwidth Manager + BBR Congestion Control
    # Bandwidth Manager: Enables Fair Queue packet scheduling + optimal sysctl settings
    # BBR (Bottleneck Bandwidth and RTT): Google's congestion control algorithm
    # https://docs.cilium.io/en/stable/network/kubernetes/bandwidth-manager/
    bandwidthManager:
      enabled: true
      bbr: true  # ENABLED: BBR congestion control for improved throughput

    # PERFORMANCE - BIG TCP
    # https://docs.cilium.io/en/stable/operations/performance/tuning/
    # BIG TCP: Allows up to 192KB GSO/GRO packets (vs 64KB default)
    enableIPv4BIGTCP: true
    enableIPv6BIGTCP: true


    socketLB:
      enabled: true
      hostNamespaceOnly: true

    # -- Enable Layer 7 network policy.
    # HTTP/gRPC protocol visibility via Envoy proxy
    # Required for: httpV2 metrics, L7 NetworkPolicies, API-level observability
    l7Proxy: true
    # -- Enable local redirect policies.
    localRedirectPolicies:
      enabled: true

    cni:
      # Required for pairing with Multus CNI
      exclusive: false

    devices: enp+
    endpointRoutes:
      enabled: true
    envoy:
      enabled: false
    gatewayAPI:
      enabled: false

    dashboards:
      enabled: true
    hubble:
      enabled: true

      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction;sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity"
        serviceMonitor:
          enabled: true
        dashboards:
          enabled: true

      relay:
        enabled: true
        rollOutPods: true
        prometheus:
          serviceMonitor:
            enabled: true
      ui:
        enabled: true
        rollOutPods: true
    operator:
      replicas: 3

      rollOutPods: true

      dashboards:
        enabled: true

      prometheus:
        metricsService: true
        enabled: true
        port: 9963
        serviceMonitor:
          enabled: true

      resources:
        limits:
          cpu: 1000m      # Increased for HA workload
          memory: 512Mi   # Increased for stability
        requests:
          cpu: 100m       # Increased baseline
          memory: 256Mi   # Increased for HA
    rollOutCiliumPods: true
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi
    prometheus:
      metricsService: true
      enabled: true
      port: 9962
      serviceMonitor:
        enabled: true
        trustCRDsExist: true
