---
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
# Defines BGP instances and peer configurations that are applied to multiple nodes.
metadata:
  name: unifi-cilium-bgp
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux

  bgpInstances:
    - name: instance-64600
      localASN: 64600

      peers:
        - name: unifi-64700-ucgf-v4
          peerASN: 64700
          peerAddress: 192.168.0.1
          peerConfigRef:
            name: unifi-cilium-peer-v4

        - name: peer-64700-ucgf-v6
          peerASN: 64700
          peerAddress: "fe80::1e0b:8bff:fe16:9435"
          peerConfigRef:
            name: unifi-cilium-peer-v6
