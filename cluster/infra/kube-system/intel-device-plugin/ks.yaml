---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app intel-device-plugin-operator
  namespace: &namespace kube-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true
  wait: true

  targetNamespace: *namespace
  path: cluster/infra/kube-system/intel-device-plugin/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app intel-device-plugin-gpu
  namespace: &namespace kube-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: intel-device-plugin-operator
      namespace: *namespace
    - name: node-feature-discovery
      namespace: *namespace

  interval: 1h
  timeout: 5m
  retryInterval: 2m

  prune: true
  wait: true

  targetNamespace: *namespace
  path: cluster/infra/kube-system/intel-device-plugin/gpu
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
