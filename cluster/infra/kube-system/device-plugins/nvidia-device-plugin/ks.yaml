---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nvidia-device-plugin
  namespace: &namespace kube-system
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  dependsOn:
    - name: node-feature-discovery
      namespace: *namespace

  prune: true
  wait: true

  targetNamespace: *namespace
  path: cluster/infra/kube-system/device-plugins/nvidia-device-plugin
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
