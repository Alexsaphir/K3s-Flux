---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
spec:
  dependsOn:
    - name: node-feature-discovery

  prune: true
  wait: true
  interval: 1h
  path: cluster/infra/kube-system/device-plugins/nvidia-device-plugin
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
