---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app intel-gpu-resource-driver
  namespace: &namespace kube-system
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/kube-system/device-plugins/intel-gpu-resource-driver
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
