---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: '${APP}'
spec:
  sourcePVC: '${APP}'
  trigger:
    schedule: '0 11 * * *'
  restic:
    pruneIntervalDays: 14
    retain:
      hourly: 24
      daily: 7

    copyMethod: '${VOLSYNC_COPYMETHOD:=Snapshot}'
    repository: '${APP}-restic-secret'
    volumeSnapshotClassName: '${VOLSYNC_SNAPSHOTCLASS:=longhorn-snapshot-vsc}'
    cacheCapacity: '${VOLSYNC_CACHE_CAPACITY:=2Gi}'
    cacheStorageClassName: '${VOLSYNC_CACHE_STORAGECLASS:=openebs-hostpath}'
    cacheAccessModes: [ '${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}' ]
    storageClassName: '${VOLSYNC_STORAGECLASS:=longhorn}'
    accessModes: [ '${VOLSYNC_SNAP_ACCESSMODES:=ReadWriteOnce}' ]
    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}
