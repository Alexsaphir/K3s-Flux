---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: prometheus-operator-crds
    namespace: observability
    chart: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
    version: 27.0.0

  - name: cilium
    namespace: kube-system
    atomic: true
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.1
    values: [ '../templates/values.yaml.gotmpl' ]
    needs: [ observability/prometheus-operator-crds ]
    hooks:
      - # Wait for cilium CRDs to be available
        events: [ 'postsync' ]
        command: bash
        args:
          - -c
          - until kubectl get crd ciliumloadbalancerippools.cilium.io ciliuml2announcementpolicies.cilium.io ciliumbgpadvertisements.cilium.io ciliumbgppeerconfigs.cilium.io ciliumbgpclusterconfigs.cilium.io &>/dev/null; do sleep 10; done
        showlogs: true

      - # Apply Cilium Resources
        command: kubectl
        args:
          - apply
          - --namespace=kube-system
          - --server-side
          - --field-manager=kustomize-controller
          - -k
          - ../../../cluster/infra/kube-system/cilium/announcements
        events:
          - postsync
        showlogs: true

  - name: coredns
    namespace: kube-system
    atomic: true
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.45.2
    values: [ '../templates/values.yaml.gotmpl' ]
    needs: [ kube-system/cilium ]
