---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: spegel
    namespace: kube-system
    atomic: true
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.6.0
    values: [ '../templates/values.yaml.gotmpl' ]

  - name: cert-manager
    namespace: cert-manager
    atomic: true
    chart: oci://ghcr.io/home-operations/charts-mirror/cert-manager
    version: v1.17.1
    values: [ '../templates/values.yaml.gotmpl' ]
    hooks:
      - # Apply cluster secret store configuration
        events: [ postsync ]
        command: kubectl
        args:
          - apply
          - --namespace=cert-manager
          - --server-side
          - --field-manager=kustomize-controller
          - --filename
          - ../../../cluster/infra/cert-manager/cert-manager/issuers/self-issuer.yaml
          - --wait=true
        showlogs: true

      - # bitwarden needs its cert so it can come up, othewrise it just stays pending
        events: [ postsync ]
        command: kubectl
        args:
          - apply
          - --namespace=external-secrets
          - --server-side
          - --field-manager=kustomize-controller
          - --filename
          - ../../../cluster/infra/external-secrets/external-secrets/bitwarden-secret/certificate.yaml
          - --wait=true

  - name: external-secrets
    namespace: external-secrets
    atomic: true
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 1.2.1
    values: [ '../templates/values.yaml.gotmpl' ]
    needs: [ cert-manager/cert-manager ]

  - name: envoy-gateway
    namespace: envoy-system
    atomic: true
    chart: oci://mirror.gcr.io/envoyproxy/gateway-helm
    version: v1.6.2
    values: [ '../templates/values.yaml.gotmpl' ]

  - name: openebs
    namespace: openebs-system
    atomic: true
    chart: oci://ghcr.io/home-operations/charts-mirror/openebs
    version: 4.4.0
    values: [ '../templates/values.yaml.gotmpl' ]

  - name: flux-operator
    namespace: flux-system
    atomic: true
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.38.1
    values: [ '../templates/values.yaml.gotmpl' ]
    needs: [ external-secrets/external-secrets ]

  - name: grafana-operator
    namespace: observability
    atomic: true
    chart: oci://ghcr.io/grafana/helm-charts/grafana-operator
    version: 5.21.4
    values: [ '../templates/values.yaml.gotmpl' ]
