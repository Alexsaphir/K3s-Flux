---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

repositories:
  - name: controlplaneio
    url: ghcr.io/controlplaneio-fluxcd/charts
    oci: true

  - name: coredns
    url: ghcr.io/coredns/charts
    oci: true

  - name: cilium
    url: https://helm.cilium.io

  - name: external-secrets
    url: ghcr.io/external-secrets/charts
    oci: true

  - name: jetstack
    url: https://charts.jetstack.io

  - name: spegel
    url: ghcr.io/spegel-org/helm-charts
    oci: true

releases:
  - name: cilium
    namespace: kube-system
    atomic: true
    chart: cilium/cilium
    version: 1.17.1
    values: [ '{{ requiredEnv "ROOT_DIR" }}/cluster/infra/kube-system/cilium/helm/values.yaml' ]
    hooks:
      - # Wait for cilium CRDs to be available
        events: [ 'postsync' ]
        command: bash
        args:
          - -c
          - until kubectl get crd ciliumbgppeeringpolicies.cilium.io ciliuml2announcementpolicies.cilium.io ciliumloadbalancerippools.cilium.io &>/dev/null; do sleep 10; done
        showlogs: true

  - name: coredns
    namespace: kube-system
    atomic: true
    chart: coredns/coredns
    version: 1.39.1
    values: [ '{{ requiredEnv "ROOT_DIR" }}/cluster/infra/kube-system/coredns/helm/values.yaml' ]
    needs: [ 'kube-system/cilium' ]

  - name: spegel
    namespace: kube-system
    atomic: true
    chart: spegel/spegel
    version: v0.0.30
    values: [ '{{ requiredEnv "ROOT_DIR" }}/cluster/infra/kube-system/spegel/helm/values.yaml' ]
    needs: [ 'kube-system/coredns' ]

  - name: cert-manager
    namespace: cert-manager
    atomic: true
    chart: jetstack/cert-manager
    version: v1.17.1
    values: [ '{{ requiredEnv "ROOT_DIR" }}/cluster/infra/cert-manager/cert-manager/helm/values.yaml' ]
    needs: [ 'kube-system/coredns' ]

  - name: external-secrets
    namespace: external-secrets
    atomic: true
    chart: external-secrets/external-secrets
    version: 0.14.3
    values: [ '{{ requiredEnv "ROOT_DIR" }}/cluster/infra/external-secrets/external-secrets/helm/values.yaml' ]
    needs: [ 'cert-manager/cert-manager' ]

  - name: flux-operator
    namespace: flux-system
    atomic: true
    chart: controlplaneio/flux-operator
    version: 0.17.0
    values: [ '{{ requiredEnv "ROOT_DIR" }}/cluster/infra/flux-system/flux-operator/helm/values.yaml' ]
    needs: [ 'cert-manager/cert-manager' ]

  - name: flux-instance
    namespace: flux-system
    atomic: true
    chart: controlplaneio/flux-instance
    version: 0.17.0
    wait: false
    values: [ '{{ requiredEnv "ROOT_DIR" }}/cluster/infra/flux-system/flux-instance/helm/values.yaml' ]
    needs: [ 'flux-system/flux-operator' ]
