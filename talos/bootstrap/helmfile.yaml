---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: prometheus-operator-crds
    namespace: observability
    chart: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
    version: 21.0.0

  - name: cilium
    namespace: kube-system
    atomic: true
    chart: oci://ghcr.io/home-operations/charts-mirror/cilium
    version: 1.17.4
    values: [ '{{ requiredEnv "INFRA_DIR" }}/kube-system/cilium/helm/values.yaml' ]
    needs: [ observability/prometheus-operator-crds ]
    hooks:
      - # Wait for cilium CRDs to be available
        events: [ 'postsync' ]
        command: bash
        args:
          - -c
          - until kubectl get crd ciliuml2announcementpolicies.cilium.io ciliumloadbalancerippools.cilium.io &>/dev/null; do sleep 10; done
        showlogs: true

  - name: coredns
    namespace: kube-system
    atomic: true
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.42.3
    values: [ '{{ requiredEnv "INFRA_DIR" }}/kube-system/coredns/helm/values.yaml' ]
    needs: [ kube-system/cilium ]

  - name: spegel
    namespace: kube-system
    atomic: true
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.3.0
    values: [ '{{ requiredEnv "INFRA_DIR" }}/kube-system/spegel/helm/values.yaml' ]
    needs: [ kube-system/coredns ]

  - name: cert-manager
    namespace: cert-manager
    atomic: true
    chart: oci://ghcr.io/home-operations/charts-mirror/cert-manager
    version: v1.17.1
    values: [ '{{ requiredEnv "INFRA_DIR" }}/cert-manager/cert-manager/helm/values.yaml' ]
    needs: [ kube-system/coredns ]

  - name: external-secrets
    namespace: external-secrets
    atomic: true
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 0.17.0
    values: [ '{{ requiredEnv "INFRA_DIR" }}/external-secrets/external-secrets/helm/values.yaml' ]
    needs: [ cert-manager/cert-manager ]

  - name: openebs
    namespace: openebs-system
    atomic: true
    chart: oci://ghcr.io/home-operations/charts-mirror/openebs
    version: 4.3.0
    values: [ '{{ requiredEnv "INFRA_DIR" }}/openebs-system/openebs/helm/values.yaml' ]
    needs: [ kube-system/coredns ]

  - name: flux-operator
    namespace: flux-system
    atomic: true
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.22.0
    values: [ '{{ requiredEnv "INFRA_DIR" }}/flux-system/flux-operator/helm/values.yaml' ]
    needs: [ external-secrets/external-secrets ]

  - name: flux-instance
    namespace: flux-system
    atomic: true
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.22.0
    wait: false
    values: [ '{{ requiredEnv "INFRA_DIR" }}/flux-system/flux-instance/helm/values.yaml' ]
    needs:
      - flux-system/flux-operator
      - openebs-system/openebs
