---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
#  - name: spegel
#    namespace: kube-system
#    atomic: true
#    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
#    version: 0.3.0
#    values: [ '{{ requiredEnv "INFRA_DIR" }}/kube-system/spegel/helm/values.yaml' ]

  - name: cert-manager
    namespace: cert-manager
    atomic: true
    chart: oci://ghcr.io/home-operations/charts-mirror/cert-manager
    version: v1.17.1
    values: [ '{{ requiredEnv "INFRA_DIR" }}/cert-manager/cert-manager/helm/values.yaml' ]

  - name: external-secrets
    namespace: external-secrets
    atomic: true
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 0.19.2
    values: [ '{{ requiredEnv "INFRA_DIR" }}/external-secrets/external-secrets/helm/values.yaml' ]
    needs: [ cert-manager/cert-manager ]

  - name: envoy-gateway
    namespace: envoy-system
    atomic: true
    chart: oci://docker.io/envoyproxy/gateway-helm
    version: 1.5.0
    values: [ '{{ requiredEnv "INFRA_DIR" }}/envoy-system/envoy-gateway/helm/values.yaml' ]

  - name: openebs
    namespace: openebs-system
    atomic: true
    chart: oci://ghcr.io/home-operations/charts-mirror/openebs
    version: 4.3.2
    values: [ '{{ requiredEnv "INFRA_DIR" }}/openebs-system/openebs/helm/values.yaml' ]

  - name: flux-operator
    namespace: flux-system
    atomic: true
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.28.0
    values: [ '{{ requiredEnv "INFRA_DIR" }}/flux-system/flux-operator/helm/values.yaml' ]
    needs: [ external-secrets/external-secrets ]

  - name: flux-instance
    namespace: flux-system
    atomic: true
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.28.0
    wait: false
    values: [ '{{ requiredEnv "INFRA_DIR" }}/flux-system/flux-instance/helm/values.yaml' ]
    needs:
      - flux-system/flux-operator
      - openebs-system/openebs
