---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: prometheus-operator-crds
    namespace: observability
    chart: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
    version: 22.0.1

  - name: cilium
    namespace: kube-system
    atomic: true
    chart: oci://ghcr.io/home-operations/charts-mirror/cilium
    version: 1.18.0
    values: [ '{{ requiredEnv "INFRA_DIR" }}/kube-system/cilium/helm/values.yaml' ]
    needs: [ observability/prometheus-operator-crds ]
    hooks:
      - # Wait for cilium CRDs to be available
        events: [ 'postsync' ]
        command: bash
        args:
          - -c
          - until kubectl get crd ciliuml2announcementpolicies.cilium.io ciliumloadbalancerippools.cilium.io &>/dev/null; do sleep 10; done
        showlogs: true

  - name: coredns
    namespace: kube-system
    atomic: true
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.43.1
    values: [ '{{ requiredEnv "INFRA_DIR" }}/kube-system/coredns/helm/values.yaml' ]
    needs: [ kube-system/cilium ]
