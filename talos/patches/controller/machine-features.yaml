---
machine:
  features:
    stableHostname: true
    kubernetesTalosAPIAccess:
      enabled: true
      allowedRoles: [ "os:admin" ]
      allowedKubernetesNamespaces: [ "system-upgrade" ]
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      resolveMemberNames: true
      forwardKubeDNSToHost: true # Requires Cilium socketLB features
