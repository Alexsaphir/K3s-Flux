# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
clusterName: &clusterName talos-cluster

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://talos.cluster.alexsaphir.com:6443

additionalApiServerCertSans: &sans
  - talos.cluster.alexsaphir.com
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *sans


# UDA generated using https://unique-local-ipv6.com/#
clusterPodNets:
  - 10.42.0.0/16
  - fdd5:aa8:9535:42::/108
clusterSvcNets:
  - 10.43.0.0/16
  - fdd5:aa8:9535:43::/108

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

allowSchedulingOnMasters: true
allowSchedulingOnControlPlanes: true


nodes:
  - hostname: "ms-01"
    ipAddress: 192.168.42.10
    controlPlane: true
    installDiskSelector:
      serial: S7GCNL0XA11778T
    machineSpec:
      secureboot: false

    networkInterfaces:
      - deviceSelector:
          hardwareAddr: 58:47:ca:7a:c6:c9

        dhcp: true
        mtu: 9000

    nodeAnnotations:
      installerImage: '{{ .MachineConfig.MachineInstall.InstallImage }}'

    nodeLabels:
      topology.kubernetes.io/region: *clusterName
      'node.longhorn.io/create-default-disk': 'true'

    schematic:
      customization:
        extraKernelArgs:
          - net.ifnames=1
          - -init_on_alloc          # Less security, faster puter
          - -init_on_free           # Less security, faster puter
          - -selinux                # Less security, faster puter
          - apparmor=0              # Less security, faster puter
          - init_on_alloc=0         # Less security, faster puter
          - init_on_free=0          # Less security, faster puter
          - mitigations=off         # Less security, faster puter
          - security=none           # Less security, faster puter
          - talos.auditd.disabled=1 # Less security, faster puter
        systemExtensions:
          officialExtensions:
            - siderolabs/i915
            - siderolabs/intel-ucode
            - siderolabs/mei
            - siderolabs/thunderbolt
            - siderolabs/lldpd
            - siderolabs/nfsrahead              # NFS Performance
            # Coral
            - siderolabs/gasket-driver
            # Gpu
            - siderolabs/nvidia-container-toolkit-production
            - siderolabs/nvidia-open-gpu-kernel-modules-production
            # Longhorn
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    extraManifests:
      - manifests/disks.yaml
      - manifests/lldpd.yaml
      - manifests/watchdog.yaml

    patches:
      - "@./patches/nodes/ms-01/sysfs.yaml"
      - "@./patches/nodes/nvidia.yaml"
      - "@./patches/nodes/thunderbolt.yaml"
      - "@./patches/udev/intel-gpu.yaml"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  nodeLabels:
    topology.kubernetes.io/zone: controlPlane

  patches:
    - "@./patches/controller/admission-controller-patch.yaml"
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/machine-features.yaml"
