---
version: "3"

tasks:
  cluster:

    desc: Bootstrap Talos, then apply helm file.
    cmds:
      - task: talos
      - task: deploy

  talos:
    desc: Bootstrap the Talos cluster
    dir: '{{.TALOS_DIR}}'
    cmds:
      - task: talhelper:secret
      - task: talhelper:genconfig
      - talhelper gencommand apply --extra-flags="--insecure" | bash
      - until talhelper gencommand bootstrap | bash; do sleep 10; done
      - until talhelper gencommand kubeconfig --extra-flags="{{.ROOT_DIR}} --force" | bash; do sleep 10; done
    preconditions:
      - test -f {{.SOPS_CONFIG_FILE}}
      - test -f {{.SOPS_AGE_KEY_FILE}}
      - test -f {{.TALOS_DIR}}/talconfig.yaml
      - which talhelper sops

  deploy:
    cmds:
      - task: deploy:namespace
      - task: deploy:config
      - task: deploy:secret
      - task: deploy:helm


  talhelper:secret:
    desc: Generate the secret.
    dir: '{{.TALOS_DIR}}'
    internal: true
    run: once
    cmd: '[ -f talsecret.sops.yaml ] || talhelper gensecret | sops --filename-override talos/talsecret.sops.yaml --encrypt /dev/stdin > talsecret.sops.yaml'
    preconditions:
      - test -f {{.SOPS_CONFIG_FILE}}
      - test -f {{.SOPS_AGE_KEY_FILE}}
      - which talhelper sops

  talhelper:genconfig:
    desc: Generate the config from `talhelper.yaml`.
    dir: '{{.TALOS_DIR}}'
    internal: true
    run: once
    cmd: talhelper genconfig
    preconditions:
      - test -f {{.TALOS_DIR}}/talconfig.yaml
      - which talhelper


  deploy:namespace:
    internal: true
    cmd: kubectl create namespace flux-system --dry-run=client -o yaml | kubectl apply -f -

  deploy:config:
    internal: true
    cmds:
      - cmd: echo {{ .CLUSTER_DIR }}
      - cmd: 'kubectl --namespace flux-system apply --server-side --filename {{ .CLUSTER_DIR }}/{{ .ITEM }}'
        for:
          - 'components/common/cluster-settings.yaml'

  deploy:secret:
    internal: true
    cmds:
      - cmd: sops exec-file {{ .CLUSTER_DIR }}/{{ .ITEM }} "kubectl --namespace flux-system apply --server-side --filename {}"
        for:
          - 'components/common/sops-age.sops.yaml'
          - 'components/common/cluster-secrets.sops.yaml'

  deploy:helm:
    internal: true
    vars:
      helm_file: '{{ .TALOS_DIR }}/bootstrap/helmfile.yaml'
    env:
      ROOT_DIR: '{{ .ROOT_DIR }}'
    cmd: helmfile --file {{ .helm_file }} apply --hide-notes --skip-diff-on-install --suppress-diff --suppress-secrets
    preconditions:
      - test -f {{ .helm_file }}
      - which helmfile
