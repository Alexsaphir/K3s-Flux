---
version: "3"

vars:
  flux_cluster: 'cluster/flux/cluster'
  flux_source_name: 'talos-kubernetes'

tasks:
  get-images:
    desc: Get images.
    cmd: |
      uvx flux-local@latest get cluster \
            --path {{ .flux_cluster }} \
            --sources {{ .flux_source_name }} \
            --all-namespaces \
            --enable-images --only-images \
            --output yaml

  diff:
    desc: Generate diff
    preconditions:
      - dyff version
    requires:
      vars:
        - name: FLUX_RESOURCE
          enum: [ 'ks', 'hr' ]
    vars:
      BRANCH_ORIGIN: main
    env:
      DIFF: 'dyff between --ignore-order-changes -l -g -o gitlab'
    cmd: |
      uvx flux-local@latest diff {{ .FLUX_RESOURCE }} \
            --path {{ .flux_cluster }} \
            --sources {{ .flux_source_name }} \
            --branch-orig {{ .BRANCH_ORIGIN }} \
            --all-namespaces


  test:hr:
    desc: 'Test helm releases (TARGET is the path to the desired resources).'
    cmd: |
      uvx flux-local@latest test \
            --path {{ .flux_cluster }} \
            --sources {{ .flux_source_name }} \
            --no-skip-crds \
            --enable-helm \
            --verbose \
            --all-namespaces \
            {{ .TARGET }}
  test:ks:
    desc: 'Test kustomizations (TARGET is the path to the desired resources).'
    cmd: |
      uvx flux-local@latest test \
            --path {{ .flux_cluster }} \
            --sources {{ .flux_source_name }} \
            --no-skip-crds \
            --verbose \
            --all-namespaces \
            {{ .TARGET }}

  test:
    desc: 'Test `ks` and `hr`'
    cmds:
      - task: test:ks
      - task: test:hr


  build:ks:
    desc: 'Build kustomizations (TARGET is the name of desired resources).'
    cmd: |
      uvx flux-local@latest build ks \
            --path {{ .flux_cluster }} \
            --sources {{ .flux_source_name }} \
            --all-namespaces \
            {{ .TARGET }}
  build:hr:
    desc: 'Build helm releases (TARGET is the name of desired resources).'
    cmd: |
      uvx flux-local@latest build hr \
            --path {{ .flux_cluster }} \
            --sources {{ .flux_source_name }} \
            --no-skip-crds \
            --all-namespaces \
            {{ .TARGET }}
  build:
    desc: 'Build `ks` and `hr`.'
    cmds:
      - task: build:ks
      - task: build:hr
